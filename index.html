<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Robert & Ofir</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold-light: #E8D9C0;
    }

    html, body { height: 100%; }

    body {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      overflow: hidden;
    }

    .hero {
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      position: relative;
      background-image: url('CactusJoesWedding_RobertandOfir-190.jpg');
      background-size: cover;
      background-position: center top;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(28, 26, 23, 0.45) 0%,
        rgba(28, 26, 23, 0.35) 50%,
        rgba(28, 26, 23, 0.6) 100%
      );
    }

    .hero-content {
      position: relative;
      z-index: 1;
    }

    .hero-eyebrow {
      font-size: 0.68rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--gold-light);
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.2s forwards;
    }

    .hero-names {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(4rem, 10vw, 8rem);
      font-weight: 300;
      line-height: 1;
      color: #ffffff;
      letter-spacing: -0.01em;
      opacity: 0;
      animation: fadeUp 1s ease 0.4s forwards;
      text-shadow: 0 2px 24px rgba(0,0,0,0.3);
    }

    .hero-ampersand {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 4vw, 3rem);
      font-style: italic;
      font-weight: 300;
      color: rgba(255,255,255,0.6);
      margin: 0.4rem 0;
    }

    .hero-divider {
      width: 40px;
      height: 0.5px;
      background: var(--gold-light);
      margin: 1.5rem auto;
      opacity: 0;
      animation: fadeUp 1s ease 0.6s forwards;
    }

    .hero-tagline {
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.7);
      opacity: 0;
      animation: fadeUp 1s ease 0.7s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="hero-content">
      <p class="hero-eyebrow">Welcome to our little corner of the internet</p>
      <h1 class="hero-names">
        Ofir
        <span class="hero-ampersand">&</span>
        Robert
      </h1>
      <div class="hero-divider"></div>
      <p class="hero-tagline">Orlando, FL &nbsp;·&nbsp; Together</p>
    </div>
  </div>
</body>
</html>
